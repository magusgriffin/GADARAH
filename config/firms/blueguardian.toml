# Legacy research profile only.
# Blue Guardian no longer offers cTrader to new accounts, and U.S. clients are
# restricted to Match Trader / TradeLocker. Not a valid U.S. cTrader target.
[firm]
name = "Blue Guardian"
challenge_type = "instant"
profit_target_pct = 0.0
daily_dd_limit_pct = 4.0
max_dd_limit_pct = 6.0
dd_mode = "trailing"
min_trading_days = 0
news_trading_allowed = true
max_positions = 5
profit_split_pct = 80.0

[broker]
host = "live.ctraderapi.com"
port = 5035
client_id_env = "GADARAH_BG_CLIENT_ID"
client_secret_env = "GADARAH_BG_CLIENT_SECRET"
